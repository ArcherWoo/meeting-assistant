worker_processes  1;

events {
    worker_connections  2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 32m;

    # Windows 多实例模式：service_runner 会启动 3 个单 worker 实例，端口范围为 6300-6302
    upstream meeting_assistant_app {
        server 127.0.0.1:6300;
        server 127.0.0.1:6301;
        server 127.0.0.1:6302;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  localhost;

        location /api/chat/completions {
            proxy_pass http://meeting_assistant_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Connection "";
            add_header X-Accel-Buffering no;
        }

        location /api/agent/execute {
            proxy_pass http://meeting_assistant_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Connection "";
            add_header X-Accel-Buffering no;
        }

        location / {
            proxy_pass http://meeting_assistant_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
